<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.65"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="0" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- metin -->
  <text x="86" y="232" fill="#ffffff" font-size="168" font-weight="800" letter-spacing="-4">101</text>
  <text x="92" y="320" fill="#ffffff" font-size="66" font-weight="800">Algoritma Oyunu</text>
  <text x="94" y="382" fill="#ffffff" fill-opacity="0.92" font-size="31" font-weight="600">Bir bilgisayar gibi düşünmeyi, oynayarak öğren.</text>

  <!-- alt etiketler -->
  <g font-size="22" font-weight="700" fill="#ffffff">
    <rect x="92" y="452" width="162" height="46" rx="23" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.4"/>
    <text x="173" y="481" text-anchor="middle">İlkokul için</text>
    <rect x="266" y="452" width="252" height="46" rx="23" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.4"/>
    <text x="392" y="481" text-anchor="middle">12 kategori, 101 oyun</text>
    <rect x="530" y="452" width="124" height="46" rx="23" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.4"/>
    <text x="592" y="481" text-anchor="middle">ücretsiz</text>
  </g>
  <text x="94" y="556" fill="#ffffff" fill-opacity="0.85" font-size="24" font-weight="700">algoritmalarim.vercel.app</text>

  <!-- dekor panel -->
  <g>
    <rect x="800" y="95" width="330" height="440" rx="30" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.22"/>

    <!-- sıralı çubuklar -->
    <g>
      <rect x="828" y="210" width="30" height="48"  rx="8" fill="url(#barA)"/>
      <rect x="868" y="186" width="30" height="72"  rx="8" fill="url(#barA)"/>
      <rect x="908" y="160" width="30" height="98"  rx="8" fill="url(#barA)"/>
      <rect x="948" y="200" width="30" height="58"  rx="8" fill="url(#barA)"/>
      <rect x="988" y="138" width="30" height="120" rx="8" fill="#fcd34d"/>
      <rect x="1028" y="120" width="30" height="138" rx="8" fill="url(#barA)"/>
      <rect x="1068" y="172" width="30" height="86" rx="8" fill="url(#barA)"/>
    </g>

    <!-- küçük ağaç -->
    <g stroke="#ffffff" stroke-opacity="0.6" stroke-width="4">
      <line x1="900" y1="330" x2="858" y2="392"/>
      <line x1="900" y1="330" x2="942" y2="392"/>
      <line x1="942" y1="392" x2="980" y2="452"/>
    </g>
    <g fill="#ffffff">
      <circle cx="900" cy="330" r="22"/>
      <circle cx="858" cy="392" r="20"/>
      <circle cx="942" cy="392" r="20" fill="#fcd34d"/>
      <circle cx="980" cy="452" r="18"/>
    </g>

    <!-- bağlı düğümler -->
    <g stroke="#ffffff" stroke-opacity="0.55" stroke-width="4">
      <line x1="1018" y1="340" x2="1062" y2="392"/>
      <line x1="1062" y1="392" x2="1040" y2="452"/>
    </g>
    <g fill="#ffffff">
      <circle cx="1018" cy="340" r="17"/>
      <circle cx="1062" cy="392" r="17"/>
      <circle cx="1040" cy="452" r="17"/>
    </g>
  </g>
</svg>
